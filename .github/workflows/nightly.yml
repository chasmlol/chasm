# Rolling nightly build: every push to main rebuilds the Windows installer and
# replaces the assets on the single "nightly" pre-release, so followers always
# have one URL with the latest merged build:
#   https://github.com/chasmlol/chasm/releases/tag/nightly
# Versioned v0.x pre-releases remain separate, hand-cut milestones.
name: nightly

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/chasm-web/ui/package-lock.json

      - name: Build UI bundle
        working-directory: crates/chasm-web/ui
        run: |
          npm ci
          npm run build

      - name: Build installer (tauri + NSIS)
        working-directory: apps/chasm-desktop
        run: npx --yes @tauri-apps/cli@^2 build

      - name: Collect installer
        id: collect
        shell: pwsh
        run: |
          $setup = Get-ChildItem target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $setup) { throw "no installer produced" }
          # Stable asset name so the download URL never changes.
          Copy-Item $setup.FullName chasm-nightly-x64-setup.exe
          "built $($setup.Name) ($([math]::Round($setup.Length/1MB,1)) MB)" >> $env:GITHUB_STEP_SUMMARY

      - name: Publish to the rolling nightly release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = "Rolling build of the latest merged main (commit ${{ github.sha }}).`n`nBuilt automatically on every push. For stable-ish milestones with patch notes, use the versioned pre-releases."
          gh release view nightly 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create nightly --prerelease --title "Nightly (latest main)" --notes $notes
          } else {
            gh release edit nightly --prerelease --title "Nightly (latest main)" --notes $notes
          }
          gh release upload nightly chasm-nightly-x64-setup.exe --clobber
          # Keep the tag pointing at what was actually built.
          git push origin +HEAD:refs/tags/nightly
